{% extends 'base.html' %}

{% block title %}Análisis de Tracción de Materiales{% endblock %}

{% block css %}
<style>
    /* Estilos específicos para generar el reporte en PDF/Impresora */
    @media print {
        body { background-color: white !important; background-image: none !important; }
        .navbar, .offcanvas, #fileInput, label[for="fileInput"], hr, .btn, .btn-group, .btn-group-sm, .d-print-none {
            display: none !important; 
        }
        .col-lg-3, .col-lg-9 {
            width: 100% !important; 
        }
        .card { border: none !important; box-shadow: none !important; }
        .card-header { background-color: #f8f9fa !important; color: black !important; border-bottom: 2px solid #dee2e6 !important; }
        body { background-color: white !important; }
    }

    /* Estilos visuales mejorados */
    body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
    }

    .card {
        border-radius: 1rem !important;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        border: none;
    }

    .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.1) !important;
    }

    .card-header {
        border-radius: 1rem 1rem 0 0 !important;
        padding: 1rem 1.25rem;
        font-weight: 600;
        letter-spacing: -0.3px;
    }

    .card-header.header-title {
        background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%);
        color: white;
    }

    .btn {
        border-radius: 0.5rem;
        padding: 0.5rem 1.25rem;
        font-weight: 500;
        transition: all 0.2s ease;
    }

    .btn-sm {
        padding: 0.375rem 0.75rem;
    }

    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 0.5rem 1rem rgba(102, 126, 234, 0.3);
    }

    .btn-success {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        border: none;
    }

    .btn-success:hover {
        transform: translateY(-2px);
        box-shadow: 0 0.5rem 1rem rgba(17, 153, 142, 0.3);
    }

    .btn-warning {
        background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%);
        border: none;
        color: white;
    }

    .btn-warning:hover {
        transform: translateY(-2px);
        box-shadow: 0 0.5rem 1rem rgba(242, 153, 74, 0.3);
        color: white;
    }

    .border-success {
        border-left: 4px solid #38ef7d !important;
    }

    .list-group-item {
        border: none;
        padding: 0.9rem 1.25rem;
        font-weight: 500;
    }

    .list-group-item:first-child {
        border-radius: 0;
    }

    .badge {
        padding: 0.5rem 1rem;
        border-radius: 2rem;
        font-weight: 500;
    }

    .val-e, .val-sy, .val-uts, .val-elong {
        font-family: 'Courier New', monospace;
        font-size: 0.9rem;
    }

    .form-label {
        font-weight: 600;
        color: #495057;
        margin-bottom: 0.25rem;
    }

    .input-group-text {
        border-radius: 0.5rem;
        background-color: #f8f9fa;
    }

    .form-control {
        border-radius: 0.5rem;
        border: 1px solid #dee2e6;
        transition: all 0.2s ease;
    }

    .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }

    .graph-div {
        background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
        border-radius: 0.75rem;
        min-height: 550px;
    }

    .test-section {
        background: white;
        border-radius: 1.5rem;
        padding: 1.5rem;
        margin-bottom: 2rem;
        box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.05);
    }

    .btn-group .btn {
        margin: 0 0.125rem;
    }

    .offcanvas {
        border-radius: 1rem 0 0 1rem;
    }

    .offcanvas-header {
        background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%);
        border-radius: 1rem 0 0 0;
    }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

{% endblock %}

{% block content %}
<div class="container-fluid px-4 mt-4">

    <div id="testsContainer"></div>

    <div class="d-flex justify-content-end gap-3 mb-5 mt-4 d-print-none">
        <button id="btnPrintGlobalReport" class="btn btn-primary fw-bold shadow-sm" disabled>
            📄 Generar Reporte Completo
        </button>
        <button id="btnAddTest" class="btn btn-success fw-bold shadow-sm">
            ➕ Agregar Nuevo Ensayo
        </button>
    </div>
</div>

<template id="testSectionTemplate">
    <div class="test-section row g-4 mb-5 pb-4 mt-4">
        
        <div class="col-lg-3 col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header header-title text-white fw-bold">📊 Ensayo</div>
                <div class="card-body"> 
                    <label class="form-label small">📁 Cargar archivo (.txt, .xlsm)</label>
                    <div class="input-group mb-3">
                        <input type="file" class="form-control file-input" accept=".txt,.csv,.xlsx,.xlsm">
                    </div>
                    <hr>
                    <h6 class="text-muted mb-3">✏️ Edición Manual de Dimensiones</h6>
                    <div class="mb-2">
                        <label class="form-label small">📐 Área Transversal (A0)</label>
                        <div class="input-group input-group-sm">
                            <input type="number" class="form-control input-area" placeholder="Ej. 76.23">
                            <span class="input-group-text">mm²</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">📏 Longitud Calibrada (L0)</label>
                        <div class="input-group input-group-sm">
                            <input type="number" class="form-control input-length" placeholder="Ej. 89.326">
                            <span class="input-group-text">mm</span>
                        </div>
                    </div>
                    <button class="btn btn-warning btn-sm w-100 fw-bold shadow-sm btn-recalculate">
                        🔄 Recalcular Ensayo
                    </button>
                </div>
            </div>

            <div class="card shadow-sm mb-4 border-success">
                <div class="card-header bg-success text-white fw-bold">📈 Propiedades Calculadas</div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span> Módulo Elástico (E)</span>
                        <span class="badge bg-primary rounded-pill val-e">-- GPa</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span> Límite Elástico (Sy 0.2%)</span>
                        <span class="badge bg-warning rounded-pill val-sy">-- MPa</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span> Resistencia Máxima (UTS)</span>
                        <span class="badge bg-danger rounded-pill val-uts">-- MPa</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span> Elongación</span>
                        <span class="badge bg-info rounded-pill val-elong">-- %</span>
                    </li>
                </ul>
            </div>
            
        </div>

        <div class="col-lg-9 col-md-8">
            <div class="d-flex justify-content-between align-items-start mb-2 d-print-none">
                <h5 class="mb-0 mt-1">📈 Curva Esfuerzo-Deformación</h5>
                <div class="d-flex flex-column align-items-end">
                    <div class="btn-group btn-group-sm mb-2" role="group">
                        <input type="checkbox" class="btn-check toggle-smoothing" autocomplete="off">
                        <label class="btn btn-outline-secondary label-smoothing">🔧 Compensación de Punta</label>
                    </div>
                    <div class="btn-group btn-group-sm" role="group">
                        <input type="checkbox" class="btn-check toggle-interpolation" checked autocomplete="off">
                        <label class="btn btn-outline-success label-interpolation">📈 Ver Rango Elástico</label>
                        
                        <input type="checkbox" class="btn-check toggle-offset" checked autocomplete="off">
                        <label class="btn btn-outline-danger label-offset">📉 Ver Offset 0.2%</label>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm w-100" style="min-height: 550px;">
                <div class="card-body d-flex flex-column p-2">
                    <div class="graph-div flex-grow-1 d-flex justify-content-center align-items-center bg-light border rounded">
                        <span class="text-muted placeholder-msg">📂 Cargue un archivo para visualizar la gráfica</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>

<div class="offcanvas offcanvas-end" tabindex="-1" id="settingsPanel" aria-labelledby="settingsPanelLabel">
    <div class="offcanvas-header text-white">
        <h5 class="offcanvas-title" id="settingsPanelLabel">⚙️ Configuración del Sistema</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
        <h6 class="mb-3">🌐 Sistema de Unidades</h6>
        <select class="form-select mb-4" id="unitSelect" disabled>
            <option value="Metrico" selected>Sistema Internacional (MPa, mm)</option>
            <option value="imperial">Sistema Imperial (psi, in)</option>
        </select>

        <h6 class="mb-3">📊 Parámetros de Elasticidad (Mínimos Cuadrados)</h6>
        <div class="mb-3">
            <label for="rangeMin" class="form-label small">🔽 Límite Inferior (Rango % UTS)</label>
            <input type="range" class="form-range" min="5" max="100" step="5" id="rangeMin" value="30">
            <output id="rangeValueMin" class="badge bg-secondary mt-2"></output>
        </div>
        <div class="mb-4">
            <label for="rangeMax" class="form-label small">🔼 Límite Superior (Rango % UTS)</label>
            <input type="range" class="form-range" min="5" max="100" step="5" id="rangeMax" value="80">
            <output id="rangeValueMax" class="badge bg-secondary mt-2"></output>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
